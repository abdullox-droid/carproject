<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CarLink | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        theme: {
          extend: {

                    "surface-dim": "#0e0e0e",
                    "surface-container-low": "#131313",
                    "on-primary": "#3f4041",
                    "inverse-on-surface": "#565554",
                    "on-primary-container": "#d0d0d0",
                    "tertiary": "#faf9f9",
                    "secondary-fixed-dim": "#d5d4d4",
                    "secondary-container": "#3a3c3c",
                    "secondary": "#9e9e9e",
                    "on-secondary-fixed-variant": "#5b5c5c",
                    "primary-dim": "#b8b9b9",
                    "on-primary-fixed": "#3e4040",

                    "on-error": "#490013",
                    "tertiary-container": "#ebebeb",
                    "inverse-surface": "#fcf8f8",
                    "surface-container-highest": "#252626",
                    "surface-container-high": "#1f2020",
                    "on-tertiary-fixed": "#484a4a",
                    "surface-tint": "#c6c6c7",
                    "surface": "#0e0e0e",
                    "primary-fixed-dim": "#d4d4d4",
                    "error-container": "#7f2737",
                    "background": "#0e0e0e",
                    "on-primary-fixed-variant": "#5a5c5c",
                    "outline": "#767575",
                    "surface-container-lowest": "#000000",
                    "secondary-dim": "#9e9e9e",
                    "on-background": "#e7e5e4",
                    "tertiary-dim": "#ebebeb",
                    "on-secondary-container": "#bfbfbf",
                    "on-secondary": "#1f2021",
                    "outline-variant": "#484848"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0e0e0e;
            color: #e7e5e4;
        }
        .kinetic-blur {
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="font-body selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Hero Background Layer -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-40" data-alt="extreme close-up of a matte black luxury supercar headlight with sharp led details and carbon fiber textures, dramatic moody lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiLiRQ2KF4DMPU0L1JQOs5KNAyJ5h2U99D4AzhQp7Ekf_7XRmDDtsf2Kry4f8VIkO_IWr3N-S-VujImJ32TmNUTjrHcisKaIwxYSOckSu3JQNXGksw3QhD6sNearHEx24-qH7ObofQGCIXlouRGL-sUB1uOhhIF3T74aUbsxvkxSODUsMsW9bGE44VsndJu0DANO3GrfdAwIQT4n8OTXwIcnD8F4TRGTm8PAK96aMYeGJ86j4lONSSWzkiEQQvqNZhe5olG9wN_mRm"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent"></div>
</div>
<!-- Layout Container -->
<main class="relative z-10 flex min-h-screen items-center justify-center p-6 md:p-12">
<div class="w-full max-w-lg">
<!-- Branding -->
<div class="mb-12 text-center md:text-left">
<span class="font-headline text-3xl font-black tracking-tighter text-on-background uppercase">CarLink</span>
<p class="mt-4 font-body text-on-surface-variant tracking-wide uppercase text-[10px] tracking-[0.2em]">The Kinetic Curator</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-low/40 kinetic-blur rounded-xl p-8 md:p-12 border border-outline-variant/10 shadow-2xl">
<!-- Section Header -->
<div class="mb-10">
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface mb-3">Welcome Back</h1>
<p class="font-body text-secondary text-sm leading-relaxed">Enter your mobile number to access your curated fleet.</p>
</div>
<!-- Input Group -->
<form class="space-y-8">
<div>
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-3 px-1">Phone Number</label>
<div class="group relative flex items-center bg-surface-container-highest rounded-xl transition-all duration-300 focus-within:ring-1 focus-within:ring-primary/40">
<div class="flex items-center px-4 py-4 space-x-2 border-r border-outline-variant/20">
<span class="font-body text-sm font-semibold text-on-surface">+998</span>
</div>
<input class="w-full bg-transparent border-none py-4 px-4 text-on-surface placeholder:text-outline/50 focus:ring-0 font-body text-lg tracking-wider" placeholder="00 000 00 00" type="tel"/>
</div>
</div>
<!-- CTA -->
<div class="space-y-4">
<button class="w-full bg-primary hover:bg-primary-fixed text-on-primary font-headline font-bold py-4 rounded-xl transition-all duration-300 active:scale-[0.98] flex items-center justify-center space-x-2" type="submit">
<span>Continue</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<p class="text-center font-body text-[11px] text-on-surface-variant/60 pt-4">
                            By continuing, you agree to the <a class="underline hover:text-on-surface transition-colors" href="#">Terms of Service</a> &amp; <a class="underline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
</p>
</div>
</form>
</div>
<!-- Verification State (Hidden by default, structure for future) -->
<div class="hidden mt-12 bg-surface-container-highest rounded-xl p-8">
<div class="mb-6">
<h2 class="font-headline text-xl font-bold text-on-surface">Verification</h2>
<p class="text-secondary text-sm">Sent to +998 •• ••• 00 00</p>
</div>
<div class="flex space-x-3 mb-8">
<input class="w-full aspect-square text-center bg-surface-container-low rounded-lg border-outline-variant/30 text-2xl font-bold focus:border-primary" maxlength="1" type="text"/>
<input class="w-full aspect-square text-center bg-surface-container-low rounded-lg border-outline-variant/30 text-2xl font-bold focus:border-primary" maxlength="1" type="text"/>
<input class="w-full aspect-square text-center bg-surface-container-low rounded-lg border-outline-variant/30 text-2xl font-bold focus:border-primary" maxlength="1" type="text"/>
<input class="w-full aspect-square text-center bg-surface-container-low rounded-lg border-outline-variant/30 text-2xl font-bold focus:border-primary" maxlength="1" type="text"/>
</div>
<button class="w-full text-primary font-label text-xs uppercase tracking-widest font-bold">Resend Code (45s)</button>
</div>
<!-- Secondary Actions -->
<div class="mt-12 flex justify-between items-center px-4">
<button class="font-label text-[11px] uppercase tracking-widest text-secondary hover:text-on-surface transition-colors flex items-center space-x-2">
<span class="material-symbols-outlined text-lg">language</span>
<span>Language: EN</span>
</button>
<button class="font-label text-[11px] uppercase tracking-widest text-secondary hover:text-on-surface transition-colors flex items-center space-x-2">
<span>Support</span>
<span class="material-symbols-outlined text-lg">headset_mic</span>
</button>
</div>
</div>
</main>
<!-- Content-exclusive Footer (Suppressing standard shell for transaction focus) -->
<footer class="fixed bottom-0 w-full px-8 py-6 flex justify-between items-center z-20">
<div class="font-body text-[10px] text-on-surface-variant uppercase tracking-[0.2em] opacity-40">
            © 2024 CarLink. Premium Mobility.
        </div>
<div class="hidden md:flex items-center space-x-6">
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
<span class="text-[10px] text-secondary font-headline font-bold uppercase tracking-widest">Tashkent Edition</span>
</div>
</footer>
</body></html>
