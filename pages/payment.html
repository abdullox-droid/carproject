<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Оплата — CarLink</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Manrope:wght@600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#c6c6c7",
                        "surface-dim": "#0e0e0e",
                        "surface-container-low": "#131313",
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #0e0e0e; color: #e7e5e4; }
        ::-webkit-scrollbar { display: none; }
        .payment-card.active { border-color: #c6c6c7; background-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="font-body selection:bg-primary selection:text-on-primary min-h-screen flex items-center justify-center p-8">

<div class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-12">
    <!-- Left: Payment Methods -->
    <div class="space-y-10">
        <div>
            <h1 class="text-4xl font-headline font-black mb-4">Оплата</h1>
            <p class="text-on-surface-variant font-bold text-xs uppercase tracking-widest">Выберите удобный способ оплаты</p>
        </div>
        
        <div class="grid grid-cols-1 gap-4">
            <button onclick="selectPayment(this)" class="payment-card active flex items-center justify-between p-8 bg-surface-container-low rounded-3xl border-2 border-white/5 transition-all">
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-[#00A8FF] rounded-xl flex items-center justify-center text-white font-black italic">CLICK</div>
                    <span class="font-bold">CLICK Up</span>
                </div>
                <span class="material-symbols-outlined text-primary">radio_button_checked</span>
            </button>
            <button onclick="selectPayment(this)" class="payment-card flex items-center justify-between p-8 bg-surface-container-low rounded-3xl border-2 border-white/5 transition-all">
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-[#33CCCC] rounded-xl flex items-center justify-center text-white font-black italic">Payme</div>
                    <span class="font-bold">Payme</span>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant">radio_button_unchecked</span>
            </button>
            <button onclick="selectPayment(this)" class="payment-card flex items-center justify-between p-8 bg-surface-container-low rounded-3xl border-2 border-white/5 transition-all">
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-[#7000FF] rounded-xl flex items-center justify-center text-white font-black italic">Uzum</div>
                    <span class="font-bold">Uzum Bank</span>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant">radio_button_unchecked</span>
            </button>
        </div>
    </div>

    <!-- Right: Summary -->
    <div class="bg-surface-container-highest p-10 rounded-[3rem] border border-white/10 shadow-2xl flex flex-col justify-between">
        <div class="space-y-8">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-primary">Детализация платежа</h3>
            <div class="space-y-4">
                <div class="flex justify-between text-sm">
                    <span class="text-on-surface-variant">Аренда (2 дня)</span>
                    <span class="font-bold">9,000,000 UZS</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-on-surface-variant">Страховка KASKO+</span>
                    <span class="font-bold">800,000 UZS</span>
                </div>
                <div class="pt-4 border-t border-white/5 flex justify-between items-center">
                    <span class="text-sm font-black uppercase tracking-widest text-primary">Итого к оплате</span>
                    <span class="text-3xl font-headline font-black">9,800,000 UZS</span>
                </div>
            </div>
            
            <!-- Deposit separate line -->
            <div class="bg-primary/10 p-6 rounded-2xl border border-primary/20">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-primary">Залог (Блокируется)</p>
                        <p class="text-xs text-on-surface-variant mt-1">Вернется после аренды</p>
                    </div>
                    <span class="text-xl font-headline font-black">5,000,000 UZS</span>
                </div>
            </div>
        </div>

        <button onclick="pay()" class="w-full mt-12 bg-primary text-black py-6 rounded-2xl font-black uppercase tracking-[0.2em] text-xs hover:shadow-[0_0_50px_rgba(198,198,199,0.3)] transition-all">Оплатить 9.8M UZS</button>
        <a href="car-details.html" class="block text-center mt-6 text-[10px] font-black uppercase tracking-widest text-on-surface-variant hover:text-on-surface">Назад к выбору опций</a>
    </div>
</div>

<script>
    function selectPayment(btn) {
        document.querySelectorAll('.payment-card').forEach(c => {
            c.classList.remove('active');
            c.querySelector('.material-symbols-outlined').textContent = 'radio_button_unchecked';
            c.querySelector('.material-symbols-outlined').classList.replace('text-primary', 'text-on-surface-variant');
        });
        btn.classList.add('active');
        btn.querySelector('.material-symbols-outlined').textContent = 'radio_button_checked';
        btn.querySelector('.material-symbols-outlined').classList.replace('text-on-surface-variant', 'text-primary');
    }

    function pay() {
        alert('💳 Перенаправление на платежный шлюз...');
        setTimeout(() => {
            window.location.href = 'confirmation.html';
        }, 2000);
    }
</script>
</body>
</html>
