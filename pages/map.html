<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Карта авто — CarLink</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #0e0e0e; color: #e7e5e4; }
        ::-webkit-scrollbar { display: none; }
        #map { height: 500px; border-radius: 2rem; }
        .car-card.active { border-color: #c6c6c7; background-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="font-body selection:bg-primary selection:text-on-primary">

<nav class="fixed top-0 w-full z-50 dark:bg-zinc-950/70 backdrop-blur-xl border-b border-white/5">
    <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto">
        <a href="../index.html" class="text-2xl font-black tracking-tighter dark:text-zinc-100 font-headline">CarLink</a>
        <div class="flex items-center gap-4">
            <a href="catalog.html" class="bg-white/5 px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest border border-white/10">Список</a>
        </div>
    </div>
</nav>

<main class="pt-24 px-8 max-w-screen-2xl mx-auto flex flex-col gap-8 pb-16">
    <!-- Geolocation Banner -->
    <div id="geoBanner" class="bg-primary/10 border border-primary/20 p-6 rounded-3xl flex items-center justify-between mb-2">
        <div class="flex items-center gap-6">
            <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-black">
                <span class="material-symbols-outlined font-black">my_location</span>
            </div>
            <div>
                <h3 class="text-sm font-black uppercase tracking-widest text-primary">Автоматическое определение локации</h3>
                <p class="text-xs text-on-surface-variant" id="locStatus">Определяем ваше местоположение для поиска ближайших авто...</p>
            </div>
        </div>
        <button onclick="getUserLocation()" class="text-[10px] font-black uppercase tracking-widest bg-white/5 px-6 py-3 rounded-xl border border-white/10 hover:bg-primary hover:text-black transition-all">Обновить</button>
    </div>

    <!-- Map Container -->
    <div class="relative group">
        <div id="map" class="shadow-2xl border border-white/5"></div>
        <div class="absolute top-6 left-6 z-[1000] bg-zinc-950/80 backdrop-blur-md p-4 rounded-2xl border border-white/10 flex items-center gap-4">
            <div class="w-3 h-3 rounded-full bg-primary animate-pulse"></div>
            <p class="text-xs font-black uppercase tracking-widest" id="currentAddress">Локация: Ташкент, Узбекистан</p>
        </div>
    </div>

    <!-- List sorted by distance -->
    <div>
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-headline font-black">Доступные машины рядом</h2>
            <div class="flex items-center gap-2 text-on-surface-variant">
                <span class="material-symbols-outlined text-sm">radar</span>
                <span class="text-[10px] font-black uppercase tracking-widest" id="nearestCarText">Ищем ближайший вариант...</span>
            </div>
        </div>
        
        <div id="distanceList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Rendered by JS -->
        </div>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const cars = [
        { id: 1, name: "Tesla Model 3", price: 150000, lat: 41.311081, lng: 69.240562, img: "https://images.unsplash.com/photo-1536700503339-1e4b06520771?auto=format&fit=crop&q=80&w=400" },
        { id: 2, name: "Porsche Taycan", price: 450000, lat: 41.315081, lng: 69.245562, img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=400" },
        { id: 3, name: "BMW M5", price: 380000, lat: 41.305081, lng: 69.235562, img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=400" },
        { id: 4, name: "Audi RS6", price: 420000, lat: 41.321081, lng: 69.250562, img: "https://images.unsplash.com/photo-1606152424101-ad2f9131952e?auto=format&fit=crop&q=80&w=400" }
    ];

    let userLat = 41.311081;
    let userLng = 69.240562;
    let userMarker;

    const map = L.map('map').setView([userLat, userLng], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const carIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="w-10 h-10 bg-primary rounded-full border-4 border-zinc-950 flex items-center justify-center shadow-2xl"><span class="material-symbols-outlined text-black text-sm">directions_car</span></div>`,
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    const userIcon = L.divIcon({
        className: 'user-icon',
        html: `<div class="w-10 h-10 bg-white rounded-full border-4 border-primary flex items-center justify-center shadow-2xl animate-pulse"><span class="material-symbols-outlined text-black text-sm">person</span></div>`,
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI / 180;
        const dLon = (lon2-lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function getUserLocation() {
        if ("geolocation" in navigator) {
            document.getElementById('locStatus').textContent = "Запрос доступа к геолокации...";
            navigator.geolocation.getCurrentPosition(position => {
                userLat = position.coords.latitude;
                userLng = position.coords.longitude;
                
                document.getElementById('locStatus').textContent = "Локация определена!";
                document.getElementById('currentAddress').textContent = `Ваша локация: ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
                
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker([userLat, userLng], { icon: userIcon }).addTo(map).bindPopup("Вы здесь");
                map.setView([userLat, userLng], 14);
                
                renderList();
            }, error => {
                document.getElementById('locStatus').textContent = "Доступ запрещен. Используем центр Ташкента.";
                renderList();
            });
        }
    }

    function renderList() {
        const list = document.getElementById('distanceList');
        const sortedCars = cars.map(car => ({
            ...car,
            distance: calculateDistance(userLat, userLng, car.lat, car.lng)
        })).sort((a, b) => a.distance - b.distance);

        const nearest = sortedCars[0];
        document.getElementById('nearestCarText').textContent = `Ближайшее авто: ${nearest.name} (${nearest.distance.toFixed(1)} км)`;

        list.innerHTML = sortedCars.map(car => `
            <div class="car-card bg-surface-container-low p-6 rounded-3xl border border-white/5 hover:border-primary/30 transition-all group cursor-pointer">
                <div class="aspect-video rounded-2xl overflow-hidden mb-4">
                    <img src="${car.img}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500"/>
                </div>
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h4 class="font-headline font-black text-lg">${car.name}</h4>
                        <p class="text-xs text-primary font-black uppercase tracking-widest">${car.distance.toFixed(1)} км от вас</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black">${car.price.toLocaleString()}</p>
                        <p class="text-[10px] text-on-surface-variant font-bold uppercase">UZS/час</p>
                    </div>
                </div>
                <a href="car-details.html?id=${car.id}" class="block w-full py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest text-center hover:bg-primary hover:text-black transition-all">Забронировать</a>
            </div>
        `).join('');

        // Add markers
        sortedCars.forEach(car => {
            L.marker([car.lat, car.lng], { icon: carIcon }).addTo(map)
             .bindPopup(`<div class="text-black p-2 font-bold">${car.name}<br>${car.price} UZS/час</div>`);
        });
    }

    getUserLocation();
</script>
</body>
</html>
